<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — AI Sales Analyst Enterprise Suite</title>
    
    <!-- Google Fonts: Outfit, Plus Jakarta Sans, JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Design System -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="auth-container animate-fade-in">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🚀</div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Get started with AI-powered sales intelligence</p>
            </div>

            <form id="register-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-input" placeholder="Alex Morgan" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-email">Work Email</label>
                    <input type="email" id="reg-email" class="form-input" placeholder="alex@company.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-input" placeholder="At least 6 characters" minlength="6" required>
                </div>

                <button type="submit" id="reg-submit-btn" class="btn btn-primary w-full mt-4 btn-lg">
                    Create Enterprise Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" style="font-weight: 600;">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Centralized JS Layer -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-password').value;
            const btn = document.getElementById('reg-submit-btn');
            Auth.register(email, pass, name, btn);
        });
    </script>
</body>
</html>
