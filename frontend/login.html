<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AI Sales Analyst Enterprise Suite</title>
    
    <!-- Google Fonts: Outfit, Plus Jakarta Sans, JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Design System -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="auth-container animate-fade-in">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">⚡</div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your enterprise sales intelligence portal</p>
            </div>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="login-email">Work Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="name@company.com" required autofocus>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="form-label" for="login-password">Password</label>
                        <a href="#" style="font-size: 12px; color: var(--color-primary);">Forgot password?</a>
                    </div>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                </div>

                <button type="submit" id="login-submit-btn" class="btn btn-primary w-full mt-4 btn-lg">
                Sign In to Portal
                </button>
            </form>

            <div class="auth-footer">
                Don't have an enterprise account? <a href="register.html" style="font-weight: 600;">Create Account</a>
            </div>
        </div>
    </div>

    <!-- Centralized JS Layer -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value;
            const btn = document.getElementById('login-submit-btn');
            Auth.login(email, pass, btn);
        });
    </script>
</body>
</html>
